<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>详情介绍 - 营造志·中华古建筑数字图鉴</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap');
        :root { --primary:#8C2318; --gold: #D4AF37; --bg:#F8F4E9; --border: 2px solid #8C2318;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:'Noto Serif SC',serif;}
        .main-title{width:100%;background:var(--primary);color:#fff;text-align:center;font-size:clamp(2.5rem,6vw,4rem);padding:20px 0;font-family:'Ma Shan Zheng',cursive;letter-spacing:3px;}
        .nav-bar {
                width: 100%;
                padding: 16px 0;
                background: rgba(255,255,255,0.9);
                display: flex;
                border-top: 2px solid var(--gold);
                border-bottom: 2px solid var(--primary);
                position: relative;
            }
            
            .nav-bar a {
                flex: 1;
                color: var(--primary);
                text-decoration: none;
                font-family: 'Ma Shan Zheng',cursive;
                text-align: center;
                padding: 8px 30px; /* 给云纹留出空间 */
                font-size: 18px;
                letter-spacing: 2px;
                position: relative;
            }
            
            /* 选项 前面云纹 */
            .nav-bar a::before {
                content: "☁";
                font-size: 16px;
                color: var(--primary);
                position: absolute;
                left: 8px;
                top: 50%;
                transform: translateY(-50%);
                opacity: 0.7;
            }
            
            
        /* 每个栏目之间 回纹分割线 */
        .nav-bar a:not(:last-child)::after {
            content: "┃";
            color: var(--gold);
            font-size: 20px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
            
            .nav-bar a.active {
                background: var(--primary);
                color: white;
            }
            
            .nav-bar a:hover {
                color: #fff;
                background-color: var(--primary);
            }

        .detail-page {
                    display:flex; max-width:1400px; margin:30px auto; gap:40px; padding:0 20px;
                }
                .left-grid {
                    width:45%; display:grid; grid-template-columns:1fr 1fr; gap:12px;
                    position:sticky; top:30px;
                }
                .left-grid img {
                    width:100%; height:260px; object-fit:cover; border-radius:10px;
                    border:2px solid var(--gold);
                }
                .right-content {
                    width:55%; background:#fff; border-radius:16px; padding:40px;
                    border:3px solid var(--gold);
                }
                .right-content .title {
                    font-size:32px; color:var(--primary); margin-bottom:20px; text-align:center;
                }
                .info-box {
                    display:flex; flex-wrap:wrap; gap:20px; margin-bottom:30px; padding-bottom:20px; border-bottom:1px solid #ddd;
                }
                .info-box strong { color:var(--primary); }
                .desc-title { font-size:22px; color:var(--primary); margin-bottom:15px; }
                .desc-content { font-size:16px; line-height:2; }
        
                .page-group { text-align:center; margin:40px 0; }
                .page-btn {
                    background:var(--primary); color:#fff; border:none;
                    padding:12px 30px; border-radius:50px; margin:0 10px;
                    cursor:pointer;
                }
        
                @media (max-width:992px) {
                    .detail-page {
                        flex-direction:column;
                    }
                    .left-grid, .right-content {
                        width:100%;
                    }
                    .left-grid {
                        position:static;
                    }
                }

        .footer {
            background:var(--primary); color:#fff; text-align:center; padding:20px 0;
        }
    </style>
</head>

<body>

<h1 class="main-title">营造志·中华古建筑数字图鉴</h1>
<div class="nav-bar">
    <a href="index.html">首页</a>
    <a href="list.html">古建筑总览</a>
    <a href="map.html">古建筑地图分布</a>
    <a href="knowledge.html">趣味知识科普</a>
    <a href="about.html">项目背景说明</a>
</div>

<div class="detail-page">
    <div class="left-grid" id="imageGrid"></div>
    <div class="right-content">
        <h2 class="title" id="Name">加载中...</h2>
        <div class="info-box">
            <span><strong>建筑类型：</strong><span id="Type"></span></span>
            <span><strong>建造年代：</strong><span id="Era"></span></span>
            <span><strong>所在地区：</strong><span id="Location"></span></span>
        </div>
        <h3 class="desc-title">建筑详情介绍</h3>
        <div class="desc-content" id="Intro_detail">加载中...</div>
    </div>
</div>

<div class="page-group">
    <button class="page-btn" id="prev">上一建筑</button>
    <button class="page-btn" id="next">下一建筑</button>
</div>

<!-- 全站统一的页脚 -->
<div class="footer">© 2026 营造志·中华古建筑数字图鉴 | 传承古建筑文化，助力数字化保护</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script>
    const urlParams = new URLSearchParams(location.search);
    let currentId = parseInt(urlParams.get("id")) || 1;

    $(async function () {
        try {
            // 只请求一次 JSON
            const data = await $.getJSON("data/arch_detail.json");

            // 找到当前建筑
            const item = data.find(x => x.Id === currentId);
            if (!item) {
                $("#Name").text("未找到该建筑");
                $("#Intro_detail").text("数据不存在");
                return;
            }

            // 赋值信息
            $("#Name").text(item.Name);
            $("#Type").text(item.Type);
            $("#Era").text(item.Era);
            $("#Location").text(item.Location);
            $("#Intro_detail").text(item.Intro_detail || item.Intro || "暂无详细介绍");

            // ✅ 图片路径已修复！！！
           $("#imageGrid").html(`
               <img src="images/${item.Name}1.png" alt="${item.Name}" class="img-fluid rounded">
               <img src="images/${item.Name}2.png" alt="${item.Name}" class="img-fluid rounded">
               <img src="images/${item.Name}3.png" alt="${item.Name}" class="img-fluid rounded">
               <img src="images/${item.Name}4.png" alt="${item.Name}" class="img-fluid rounded">
           `);

            // 上一页
            $("#prev").click(() => {
                if (currentId > 1) {
                    location.href = `detail.html?id=${currentId - 1}`;
                }
            });

            // 下一页
            $("#next").click(() => {
                if (currentId < data.length) {
                    location.href = `detail.html?id=${currentId + 1}`;
                }
            });

        } catch (err) {
            $("#Name").text("数据加载失败");
            $("#Intro_detail").text("请检查文件路径是否正确");
        }
    });
</script>

<script>
    $(function(){
        $.get("login-modal.html", function(html){
            $('body').append(html);
            updateUserStatus();
        });
    });

    function updateUserStatus(){
        const user = localStorage.getItem('user');
        $("#userInfo, #loginBtn").remove();
        $("body").append(`
            <div id="userInfo" style="position:fixed;top:22px;right:24px;color:#fff;background:#8c2318;padding:8px 12px;border-radius:6px;z-index:99999;display:none;font-size:1rem;"></div>
            <button id="loginBtn" onclick="openLogin()" style="position:fixed;top:22px;right:24px;background:#8c2318;color:#fff;border:2px solid #fff;padding:8px 16px;border-radius:8px;z-index:99999;cursor:pointer;font-size:1rem;font-weight:bold;">登录/注册</button>
        `);
        if(user){
            $("#userInfo").html(`欢迎，${user} <span onclick="logout()" style="cursor:pointer;color:#fff;margin-left:8px;">退出</span>`).show();
            $("#loginBtn").hide();
        }else{
            $("#userInfo").hide();
            $("#loginBtn").show();
        }
    }

    function logout(){
        localStorage.removeItem('user');
        updateUserStatus();
        alert('已退出登录');
        location.reload();
    }
</script>
</body>
</html>
