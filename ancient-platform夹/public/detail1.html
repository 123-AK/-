<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古建详情 - 卷轴展开</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
            font-family: 'Noto Serif SC', serif;
        }

        /* ========== 卷轴容器（修复动画，解决错位、看不见） ========== */
        .scroll-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            min-height: 650px;
            background: #f7f1e3;
            background-image: url('https://imgs.aigei.com/preview/2021/11/15/616a3e0d8f578.jpg!web');
            background-blend-mode: soft-light;
            border-radius: 12px;
            border: 6px solid #a67c52;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: scrollOpen 0.5s ease-out forwards paused;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 35px 40px;
            overflow-y: auto;
        }

        /* 修复卷轴展开动画：用scale代替width，解决错位、看不见 */
        @keyframes scrollOpen {
    0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
    }
    100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
    }
}

        /* ========== 卷轴两端装饰 ========== */
        .scroll-container::before,
        .scroll-container::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            width: 30px;
            background: #8C2318;
            border-radius: 4px;
        }
        .scroll-container::before { left: 0; }
        .scroll-container::after { right: 0; }

        /* ========== 详情内容样式 ========== */
        #detailImg {
    width: 100%;
    max-width: 780px;
    height: 280px;
    object-fit: cover;
    border: 3px solid #a67c52;
    border-radius: 6px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    opacity: 1;
}

#detailName {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 30px;
    color: #8C2318;
    text-align: center;
    margin-bottom: 15px;
    border-bottom: 2px solid #8C2318;
    padding-bottom: 8px;
    width: 90%;
    text-shadow: 1px 1px 2px #D4AF37, 0 0 5px rgba(212, 175, 55, 0.5);
    letter-spacing: 6px;
    opacity: 1;
}

.detail-info {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    opacity: 1;
}
.detail-info span {
    background: #f7f1e3;
    border: 1px solid #8C2318;
    color: #8C2318;
    font-weight: 600;
    font-size: 14px;
    padding: 6px 16px;
    border-radius: 20px;
}

#detailIntro {
    font-size: 16px;
    line-height: 2;
    color: #222;
    text-align: justify;
    text-indent: 2em;
    padding: 0 25px;
    margin-bottom: 15px;
    white-space: pre-line;
    opacity: 1;
}

.detail-extra {
    width: 90%;
    margin-bottom: 15px;
    padding: 15px 20px;
    background: rgba(140, 35, 24, 0.05);
    border-radius: 8px;
    border: 1px solid rgba(140, 35, 24, 0.1);
    opacity: 1;
}
.detail-extra .label {
    font-weight: bold;
    color: #8C2318;
    font-size: 16px;
    margin-bottom: 8px;
    font-family: 'Ma Shan Zheng', cursive;
    letter-spacing: 2px;
}
.detail-extra .content {
    color: #333;
    font-size: 15px;
    line-height: 1.8;
}

           </style>

    <!-- 引入字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scroll-container">
        <img id="detailImg" src="">
        <h2 id="detailName"></h2>
        <div class="detail-info">
            <span id="detailEra"></span>
            <span id="detailLoc"></span>
            <span id="detailType"></span>
        </div>
        <p id="detailIntro"></p>
        <div class="detail-extra">
            <div class="label">结构特点</div>
            <div class="content" id="detailFeature"></div>
        </div>
        <div class="detail-extra">
            <div class="label">代表古建</div>
            <div class="content" id="detailRepresent"></div>
        </div>
        <div class="detail-extra">
            <div class="label">营造小知识</div>
            <div class="content" id="detailKnowledge"></div>
        </div>
    </div>

</body>
</html>
