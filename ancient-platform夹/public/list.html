<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古建图鉴 - 营造志·中华古建筑数字图鉴</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap');
        :root { --primary:#8C2318; --bg:#F8F4E9; --border: 2px solid #8C2318;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);font-family:'Noto Serif SC',serif;}
        .main-title{width:100%;background:var(--primary);color:#fff;text-align:center;font-size:clamp(2.5rem,6vw,4rem);padding:20px 0;font-family:'Ma Shan Zheng',cursive;letter-spacing:3px;}
        .nav-bar {
                width: 100%;
                padding: 16px 0;
                background: rgba(255,255,255,0.9);
                display: flex;
                border-top: 2px solid var(--gold);
                border-bottom: 2px solid var(--primary);
                position: relative;
            }
            
            .nav-bar a {
                flex: 1;
                color: var(--primary);
                text-decoration: none;
                font-family: 'Ma Shan Zheng',cursive;
                text-align: center;
                padding: 8px 30px; /* 给云纹留出空间 */
                font-size: 18px;
                letter-spacing: 2px;
                position: relative;
            }
            
            /* 选项 前面云纹 */
            .nav-bar a::before {
                content: "☁";
                font-size: 16px;
                color: var(--primary);
                position: absolute;
                left: 8px;
                top: 50%;
                transform: translateY(-50%);
                opacity: 0.7;
            }
            
            
        /* 每个栏目之间 回纹分割线 */
        .nav-bar a:not(:last-child)::after {
            content: "┃";
            color: var(--gold);
            font-size: 20px;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
            
            .nav-bar a.active {
                background: var(--primary);
                color: white;
            }
            
            .nav-bar a:hover {
                color: #fff;
                background-color: var(--primary);
            }
        .section-title{font-family:'Ma Shan Zheng',cursive;color:var(--primary);margin:30px 0 20px;}
      /* 筛选栏样式：和导航栏隔开，更舒展 */
.filter-bar{
    background:#fff;
    padding:24px;
    border-radius:12px;
    border:2px solid var(--primary);
    margin: 30px auto 40px; /* 上30px，左右自动居中，下40px */
    max-width: 95%;
}
.filter-title{font-family:'Ma Shan Zheng',cursive;color:var(--primary);margin-bottom:20px;font-size:1.4rem;}
.filter-group{margin-bottom:20px;}
.filter-group:last-child{margin-bottom:0;}
.filter-btn{border:1px solid var(--primary);background:#fff;color:var(--primary);padding:8px 16px;border-radius:30px;margin:6px 8px 6px 0;cursor:pointer;transition:0.3s;font-size:0.95rem;}
.filter-btn.active,.filter-btn:hover{background:var(--primary);color:#fff;transform:scale(1.05);}
        .arch-card{border:2px solid var(--primary);border-radius:12px;overflow:hidden;background:#fff;height:100%;transition:all 0.3s ease;}
        .arch-card:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(140,35,24,0.2);}
        .arch-card-img{width:100%;height:260px;object-fit:cover;background:#f5f5f5;}
        .arch-card-body{padding:24px;}
        .arch-card-title{font-family:'Ma Shan Zheng',cursive;color:var(--primary);font-size:1.5rem;margin-bottom:12px;}
        .arch-card-info{color:#666;margin-bottom:18px;line-height:1.7;}
        .btn-detail{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:6px;font-family:'Ma Shan Zheng',cursive;transition:0.3s;}
        .btn-detail:hover{background:#a83227;transform:scale(1.05);}
        .pagination{justify-content:center;margin:50px 0;}
        .page-link{color:var(--primary);border:1px solid var(--primary);margin:0 5px;}
        .page-link:hover{background:var(--primary);color:#fff;}
        .page-item.active .page-link{background:var(--primary);border-color:var(--primary);}
		/* 全站统一的页脚 */
		.footer {
		    background: var(--primary);
		    color: white;
		    text-align: center;
		    padding: 20px 0;
		    margin-top: 50px;
		}
    </style>
</head>
<body>

<h1 class="main-title">营造志·中华古建筑数字图鉴</h1>
<div class="nav-bar">
    <a href="index.html">首页</a>
    <a href="list.html"class="active">古建筑总览</a>
    <a href="map.html">古建筑地图分布</a>
    <a href="knowledge.html" >趣味知识科普</a>
    <a href="about.html">项目背景说明</a>
</div>

<div class="container">
    <div class="filter-bar">
        <div class="filter-group">
            <h4 class="filter-title">按建筑类型筛选</h4>
            <div>
                <button class="filter-btn active" data-type="all">全部</button>
                <button class="filter-btn" data-type="宫殿">宫殿建筑</button>
                <button class="filter-btn" data-type="园林">园林建筑</button>
                <button class="filter-btn" data-type="古塔">古塔建筑</button>
                <button class="filter-btn" data-type="古桥">古桥建筑</button>
                <button class="filter-btn" data-type="民居">民居建筑</button>
                <button class="filter-btn" data-type="坛庙">坛庙建筑</button>
                <button class="filter-btn" data-type="宗教">宗教建筑</button>
                <button class="filter-btn" data-type="楼阁">楼阁建筑</button>
                <button class="filter-btn" data-type="陵墓">陵墓建筑</button>
            </div>
        </div>

        <div class="filter-group">
            <h4 class="filter-title">按建造年代筛选</h4>
            <div>
                <button class="filter-btn active" data-era="all">全部</button>
                <button class="filter-btn" data-era="先秦">先秦</button>
                <button class="filter-btn" data-era="汉">汉朝</button>
                <button class="filter-btn" data-era="魏晋南北朝">魏晋南北朝</button>
                <button class="filter-btn" data-era="隋唐">隋唐</button>
                <button class="filter-btn" data-era="宋辽金">宋辽金</button>
                <button class="filter-btn" data-era="元明清">元明清</button>
            </div>
        </div>
    </div>

    <div class="row g-4" id="archList"></div>

    <nav aria-label="Page navigation">
        <ul class="pagination" id="pagination"></ul>
    </nav>
</div>

<!-- 全站统一的页脚 -->
<div class="footer">© 2026 营造志·中华古建筑数字图鉴 | 传承古建筑文化，助力数字化保护</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
const PAGE_SIZE = 9;
let currentPage = 1;
let allData = [];
let filteredData = [];
let currentType = 'all';
let currentEra = 'all';

// 年代大分类（超级简单，不细分！）
const eraGroup = {
    "先秦": ["战国", "秦"],
    "汉": ["汉", "东汉"],
    "魏晋南北朝": ["北魏", "东晋", "南唐"],
    "隋唐": ["隋", "唐"],
    "宋辽金": ["宋", "南宋", "辽", "金"],
    "元明清": ["明", "清", "明清", "元明清"]
};

$(function(){
    $.get("login-modal.html",function(html){$("body").append(html);updateUserStatus();});
    
    $.get('/api/architecture', function(res){
        if(res.code === 200){
            allData = res.data;
            applyFilter();
            renderPage();
            renderPagination();
        }
    });

    $('.filter-btn[data-type]').click(function(){
        $('.filter-btn[data-type]').removeClass('active');
        $(this).addClass('active');
        currentType = $(this).data('type');
        applyFilter();
        currentPage = 1;
        renderPage();
        renderPagination();
    });

    $('.filter-btn[data-era]').click(function(){
        $('.filter-btn[data-era]').removeClass('active');
        $(this).addClass('active');
        currentEra = $(this).data('era');
        applyFilter();
        currentPage = 1;
        renderPage();
        renderPagination();
    });
});

// ✅ 这是我帮你改好的筛选逻辑！
function applyFilter() {
    filteredData = allData.filter(item => {
        const typeMatch = currentType === 'all' || item.Type === currentType;
        let eraMatch = true;

        if (currentEra !== 'all') {
            eraMatch = eraGroup[currentEra].includes(item.Era);
        }

        return typeMatch && eraMatch;
    });
}

function renderPage(){
    const start = (currentPage - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const pageData = filteredData.slice(start, end);
    
    let html = '';
    pageData.forEach(item => {
        html += `
        <div class="col-md-4">
            <div class="arch-card">
                <img src="images/${item.ImageUrl}" class="arch-card-img" alt="${item.Name}" onerror="this.src='https://via.placeholder.com/400x260/8C2318/FFFFFF?text=${encodeURIComponent(item.Name)}'">
                <div class="arch-card-body">
                    <h5 class="arch-card-title">${item.Name}</h5>
                    <div class="arch-card-info">
                        <p>${item.Era} · ${item.Location} · ${item.Type}建筑</p>
                        <p>${item.Intro}</p>
                    </div>
                    <a href="detail.html?id=${item.Id}" class="btn btn-detail">查看详情</a>
                </div>
            </div>
        </div>`;
    });
    $('#archList').html(html);
}

function renderPagination(){
    const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
    let html = '';
    html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="goToPage(${currentPage - 1})">上一页</a></li>`;
    for(let i=1;i<=totalPages;i++){
        html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="goToPage(${i})">${i}</a></li>`;
    }
    html += `<li class="page-item ${currentPage===totalPages?'disabled':''}"><a class="page-link" href="#" onclick="goToPage(${currentPage+1})">下一页</a></li>`;
    $('#pagination').html(html);
}

function goToPage(page){
    const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
    if(page<1||page>totalPages)return;
    currentPage=page;
    renderPage();
    renderPagination();
}

 $(function(){
            if(!$("#loginModal").length){
                $.get("login-modal.html", function(html){
                    $('body').append(html);
                    updateUserStatus();
                });
            }else{
                updateUserStatus();
            }
        });

        // 优化登录按钮：固定右上角，不遮挡导航
        function updateUserStatus(){
            const user = localStorage.getItem('user');
            $("#userInfo, #loginBtn").remove();
            $("body").append(`
                <div id="userInfo" style="position:fixed;top:15px;right:20px;color:#fff;background:#8c2318;padding:8px 12px;border-radius:6px;z-index:99999;display:none;font-size:1rem;">
                </div>
                <button id="loginBtn" onclick="openLogin()" style="position:fixed;top:15px;right:20px;background:#8c2318;color:#fff;border:2px solid #fff;padding:8px 16px;border-radius:8px;z-index:99999;cursor:pointer;font-size:1rem;font-weight:bold;transition:all 0.3s ease;">
                    登录/注册
                </button>
            `);
            if(user){
                $("#userInfo").html(`欢迎，${user} <span onclick="logout()" style="cursor:pointer;color:#fff;margin-left:8px;">退出</span>`).show();
                $("#loginBtn").hide();
            }else{
                $("#userInfo").hide();
                $("#loginBtn").show();
            }
        }

        function logout(){
            localStorage.removeItem('user');
            updateUserStatus();
            alert('已退出登录');
            location.reload();
        }
</script>
</body>
</html>
